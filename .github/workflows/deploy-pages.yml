name: Deploy to Pages

on:
  push:
    branches: [main, dev, staging]
    paths:
      - "patterns/**.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  bump-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Determine deploy directory
        id: env
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          case "$BRANCH" in
            main)    dir=assets ;;
            staging) dir=assets-stg ;;
            dev)     dir=assets-dev ;;
            *)       echo "::error::Unsupported branch '$BRANCH'" && exit 1 ;;
          esac
          echo "deploy_dir=$dir" >> "$GITHUB_OUTPUT"

      # --- Checkout source ---
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: source

      # --- Version Bump ---
      - uses: dart-lang/setup-dart@v1

      - name: Clone editor repo
        run: |
          git clone --depth 1 \
            https://github.com/audiflow/audiflow-smartplaylist-editor.git \
            /tmp/editor

      - name: Install editor dependencies
        working-directory: /tmp/editor
        run: dart pub get

      - name: Bump versions
        working-directory: source
        run: |
          dart run /tmp/editor/packages/sp_cli/bin/bump_versions.dart \
            patterns HEAD~1

      - name: Commit version bump
        working-directory: source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add patterns/
          git diff --cached --quiet || git commit -m "chore: bump versions"
          git push

      # --- Deploy to gh-pages ---
      - name: Checkout gh-pages
        id: checkout-ghpages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if needed
        if: steps.checkout-ghpages.outcome == 'failure'
        run: |
          mkdir -p gh-pages && cd gh-pages
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: initialize gh-pages"
          git remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Read schema version
        id: schema
        run: |
          version=$(jq -r '.schemaVersion // empty' source/patterns/meta.json)
          if [ -z "$version" ]; then
            echo "::error::schemaVersion not found in patterns/meta.json"
            exit 1
          fi
          echo "version=v${version}" >> "$GITHUB_OUTPUT"

      - name: Sync patterns to deploy directory
        env:
          DEPLOY_DIR: ${{ steps.env.outputs.deploy_dir }}
          SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
        run: |
          mkdir -p "gh-pages/${DEPLOY_DIR}/${SCHEMA_VERSION}"
          rsync -a --delete \
            source/patterns/ \
            "gh-pages/${DEPLOY_DIR}/${SCHEMA_VERSION}/"

      - name: Commit and push to gh-pages
        working-directory: gh-pages
        env:
          DEPLOY_DIR: ${{ steps.env.outputs.deploy_dir }}
          SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: update ${DEPLOY_DIR}/${SCHEMA_VERSION} from ${BRANCH}"
          for attempt in 1 2 3; do
            git push origin gh-pages && exit 0
            echo "Push conflict (attempt ${attempt}), rebasing..."
            git pull --rebase origin gh-pages
          done
          echo "::error::Failed to push to gh-pages after 3 attempts"
          exit 1
