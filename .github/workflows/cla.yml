# CLA Assistant workflow
# Uses contributor-assistant/github-action to manage CLA signatures.
# No untrusted input is used in run: commands -- all handling is
# delegated to the GitHub Action which processes inputs safely.
name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: |
          github.event_name == 'pull_request_target'
          || (github.event_name == 'issue_comment' && github.event.issue.pull_request)
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: "main"
          allowlist: "reedom,dependabot[bot],github-actions[bot]"
          remote-organization-name: "audiflow"
          remote-repository-name: ".github"
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before we can merge this PR, you need
            to sign the Contributor License Agreement (CLA.md in this repository).
            To sign, please comment on this PR with exactly:
            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          lock-pullrequest-aftermerge: false
