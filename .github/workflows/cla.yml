# CLA Assistant workflow
#
# Thin caller stub that delegates to the org-wide reusable workflow at
# audiflow/.github. Allowlist and action version are managed centrally
# there so updates apply to every consumer branch immediately, without
# cherry-pick fan-out across long-lived version branches that never
# merge back to main.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    uses: audiflow/.github/.github/workflows/cla-reusable.yml@main
    secrets: inherit
