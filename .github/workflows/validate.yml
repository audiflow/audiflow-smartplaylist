name: Validate Configs

on:
  pull_request:
    branches: ["prod/**", "stg/**", "dev/**"]
    paths: ["patterns/**.json"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Parse schema version from base branch
        id: env
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          version="${BASE_REF#*/}"
          if ! echo "$version" | grep -qE '^v[0-9]+$'; then
            echo "::error::Cannot parse version from base branch '${BASE_REF}'"
            exit 1
          fi
          echo "schema_version=${version}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - name: Download sp-cli
        env:
          SCHEMA_VERSION: ${{ steps.env.outputs.schema_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$SCHEMA_VERSION" \
            --repo audiflow/audiflow-smartplaylist-editor \
            --pattern 'sp-cli-linux-x64' \
            --output /usr/local/bin/sp-cli
          chmod +x /usr/local/bin/sp-cli

      - name: Validate configs
        run: sp-cli validate $GITHUB_WORKSPACE/patterns
